<Main>
	<Game>
		<LogConf>
			eLogSetMod = 5 # 0无日志模式 1FATAL 2ERROR 3WARN 4INFO 5DEBUG 6VERB
			strLogPath = /usr/local/app/tars/app_log/AIGame/RoomServer/so/
			tWriteSize = 0
			tCacheSize = 0
			bLogPerRoom = 0
			iGameReleaseID = 22000401
		</LogConf>
		<RulesConfig>
		</RulesConfig>
		<OtherConfig>
			#其他配置
			nDefaultRoundNum  = 8	#默认一局最少轮数
			nMinPlayerNum  = 4	#默认开局至少加入的玩家数
			nMaxPlayerNum  = 4	#默认开局最多加入的玩家数
			nLeastRoundNum = 0	#至少要打的圈数，未达到该圈数逃跑者会扣分，设置为0时表示不没有圈数的限制，默认值为0
			iLoseLimitScore= 80	#每一盘玩家输的分数不会超过该值
			iEscapePunish  = 0	#逃跑罚分 默认不罚分
			nDefaultTimeout= 30 #默认的其他时间(秒)
			nDisCardTimeout= 15 #出牌思考时间
			nActTimeout	   = 10 #动作思考时间,如碰杠胡(秒)
			nNextRoundTimeout = 25 #下一回合等待时间,结算框上的时间显示(秒)
			bAutoActWhenNetBroked	= 0	#玩家断线后，服务器是否托管出牌默认为0,1为托管出牌
			bAllowJoinWhenRuning	= 0	#1允许中途加入 2不允许中途加入
			bBeginWithRoomOwerAgree	= 0 #需要房主同意才能开始
			bZhuaNiaoWithHuedor = 1 #1用胡牌者开始抓鸟  0则从庄家开始 
			bCalcNiaoWithPlus	= 1 #1用加法计算鸟分  0则用乘法计算鸟分
		</OtherConfig>
	</Game>
</Main>