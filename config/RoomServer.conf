	#服务配置
	<SystemConfig>
		#游戏库路径
		ResPath = /data/tars/so/
		#每个时间片任务处理数量
		TaskProcNum = 20
		#每个时间片任务超时警示（单位为毫秒）
		TaskProcTimeout = 20
		#配牌器开关
		DealFlag = 0
	</SystemConfig>
	#蒙特卡算法配置
	<algConfig>
		path = /data/tars/so/
	</algConfig>
	#服务配置  open=0关闭，1为开启
	<aiPlatform>
		open = 0
		host = 10.10.10.86
		port = 16001
		token = xxxxxxxxxxxx
	</aiPlatform>
	<SeatNumber>
		num = 2:6:9
	</SeatNumber>
	<MatchMail>
		<40001>
			name = 一亿免费赛
		</40001>
		<40002>
			name = TTPOKER费赛
		</40002>
		<40003>
			name = 十亿保底赛
		</40003>
		<40004>
			name = 百亿狂欢赛
		</40004>
		reward_content = 恭喜您在&的&中, 获取第&名, 特此奖励！
		quit_content = 您报名的&, 因为参赛人数不足, 取消比赛, 并返还您的报名费！
